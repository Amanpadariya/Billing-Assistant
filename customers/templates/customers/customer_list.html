{% extends "base.html" %}
{% load static %}

{% block content %}

<div class="d-flex justify-content-between align-items-center mb-4">

    <div>
        <h3 class="fw-bold mb-0">
            👥 Customers
        </h3>
    </div>

    <a href="{% url 'customers:add_customer' %}"
       class="btn btn-primary">
        <i class="fa-solid fa-user-plus"></i> Add Customer
    </a>

</div>


<div class="card shadow-sm border-0">

    <div class="card-body">

        <!-- Search -->
        <div class="row mb-3">
            <div class="col-md-4">
                <input type="text"
                       id="customerSearch"
                       class="form-control"
                       placeholder="Search customer...">
            </div>
        </div>


        <div class="table-responsive">

            <table class="table table-hover align-middle">

                <thead class="table-light">
                    <tr>
                        <th>Customer</th>
                        <th>Phone</th>
                        <th>Email</th>
                        <th class="text-end">Actions</th>
                    </tr>
                </thead>

                <tbody id="customerTable">

                    {% for customer in customers %}

                    <tr>

                        <td class="fw-semibold customer-name">
                            <a href="{% url 'customers:customer_detail' customer.id %}"
                               class="text-decoration-none text-dark">
                                {{ customer.name }}
                            </a>
                        </td>

                        <td class="text-muted">
                            {{ customer.phone }}
                        </td>

                        <td class="text-muted">
                            {{ customer.email }}
                        </td>

                        <td class="text-end">

                            <a href="{% url 'customers:edit_customer' customer.id %}"
                               class="btn btn-sm btn-outline-warning">
                               <i class="fa-solid fa-pen"></i>
                            </a>

                            <a href="{% url 'customers:delete_customer' customer.id %}"
                               class="btn btn-sm btn-outline-danger ms-1"
                               onclick="return confirm('Delete this customer?')">
                               <i class="fa-solid fa-trash"></i>
                            </a>

                        </td>

                    </tr>

                    {% empty %}

                    <tr>
                        <td colspan="4" class="text-center text-muted py-4">
                            No customers found
                        </td>
                    </tr>

                    {% endfor %}

                </tbody>

            </table>

        </div>

    </div>

</div>


<!-- SEARCH SCRIPT -->

<script>

const searchInput = document.getElementById("customerSearch");
const customers = document.querySelectorAll("#customerTable tr");

searchInput.addEventListener("keyup", function(){

    const searchText = this.value.toLowerCase();

    customers.forEach(function(row){

        const name = row.querySelector(".customer-name");

        if(name){

            const text = name.innerText.toLowerCase();

            if(text.includes(searchText)){
                row.style.display="";
            }
            else{
                row.style.display="none";
            }

        }

    });

});

</script>

{% endblock %}

{% extends "base.html" %}
{% block content %}

<div class="d-flex justify-content-between align-items-center mb-4">
    <div>
        <h3 class="fw-bold mb-0">Account Dashboard</h3>
        <small class="text-muted">Logged in as {{ request.user.username }} ({{ request.user.role }})</small>
    </div>
</div>

<div class="card shadow-sm border-0">
    <div class="card-body text-center py-5 text-muted">
        <i class="fa-solid fa-user-shield fa-2x mb-3"></i>
        <p class="mb-0">Staff account dashboard.</p>

        {% if request.user.role == "ADMIN" %}
        <div class="mt-4">
            <a href="{% url 'account:manage_users' %}" class="btn btn-dark">
                Manage Users
            </a>
        </div>
        {% endif %}

    </div>
</div>

{% endblock %}
